<!DOCTYPE html>
<html>
    <head>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <style>
        body {
            font-family: "Montserrat", sans-serif;
            font-optical-sizing: auto;
            font-style: normal;
        }
        #centralCard {
            will-change: height;
        }
        .panel {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        </style>
    </head>
    <body class="bg-slate-300 w-full h-full overflow-x-hidden">
        <canvas id="rainCanvas" class="fixed top-0 left-0 w-full h-full pointer-events-none z-0"></canvas>

        <div class="bg-transparent min-w-screen min-h-screen relative z-10">
            <div class="flex items-center justify-center p-3 sm:p-4 min-h-screen">
                <div id="centralCard" class="w-full max-w-2xl opacity-85 min-h-[80vh] sm:min-h-[420px] bg-[#FFD801] rounded-md p-6 sm:p-8 flex flex-col items-center justify-center gap-6 overflow-hidden">
                    <div class="panel w-full flex flex-col items-center justify-center gap-6">
                        <div>
                            <h1 class="text-3xl sm:text-4xl font-bold text-slate-800 text-center">Quack File</h1>
                            <p class="text-slate-800 text-center max-w-md mt-4 text-base sm:text-sm px-2 sm:px-0">
                                Instantly share files and links between devices. Send and receive directly.
                                <br>
                                Filesize needs to be &lt; 50 MB
                            </p>
                        </div>
                        <div class="w-full flex flex-col items-center">
                            <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 w-full max-w-xs sm:max-w-none justify-center">
                                <button id="receiveBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-4 sm:py-3 px-6 rounded shadow transition w-full sm:w-40 cursor-pointer">
                                    Receive
                                </button>
                                <button id="sendBtn" class="bg-slate-800 hover:bg-slate-900 text-white font-medium py-4 sm:py-3 px-6 rounded shadow transition w-full sm:w-40 cursor-pointer">
                                    Send
                                </button>
                            </div>

                            <p class="text-slate-800 text-center text-base sm:text-sm max-w-md mt-4 px-2 sm:px-0">
                                &#128712; Everything you send is indexed and encrypted. Once the recipient downloads the file, it is gone forever.
                                <a class="text-slate-600 underline ml-1" href="https://www.heifer.org/give/gift-catalog/animals/flock-of-ducks">Also, Donate to ducks!</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const canvas = document.getElementById("rainCanvas");
            const ctx = canvas.getContext("2d");

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener("resize", resizeCanvas);

            const maxDrops = 150;
            const drops = [];

            for (let i = 0; i < maxDrops; i++) {
                drops.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    length: Math.random() * 20 + 10,
                    speed: Math.random() * 15 + 10,
                    opacity: Math.random() * 0.3 + 0.1
                });
            }

            function drawRain() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                for (let i = 0; i < maxDrops; i++) {
                    const drop = drops[i];
                    ctx.beginPath();
                    ctx.strokeStyle = `rgba(100, 116, 139, ${drop.opacity})`;
                    ctx.lineWidth = 1.5;
                    ctx.moveTo(drop.x, drop.y);
                    ctx.lineTo(drop.x, drop.y + drop.length);
                    ctx.stroke();

                    drop.y += drop.speed;

                    if (drop.y > canvas.height) {
                        drop.y = -drop.length;
                        drop.x = Math.random() * canvas.width;
                        drop.speed = Math.random() * 15 + 10;
                    }
                }

                requestAnimationFrame(drawRain);
            }
            drawRain();

            const centralCard = document.getElementById("centralCard");

            const templates = {
                menu: `
                    <div class="panel w-full flex flex-col items-center justify-center gap-6">
                        <div>
                            <h1 class="text-3xl sm:text-4xl font-bold text-slate-800 text-center">Quack File</h1>
                            <p class="text-slate-800 text-center max-w-md mt-4 text-base sm:text-sm px-2 sm:px-0">
                                Instantly share files and links between devices. Send and receive directly.
                                <br>
                                Filesize needs to be &lt; 50 MB
                            </p>
                        </div>
                        <div class="w-full flex flex-col items-center">
                            <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 w-full max-w-xs sm:max-w-none justify-center">
                                <button id="receiveBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-4 sm:py-3 px-6 rounded shadow transition w-full sm:w-40 cursor-pointer">
                                    Receive
                                </button>
                                <button id="sendBtn" class="bg-slate-800 hover:bg-slate-900 text-white font-medium py-4 sm:py-3 px-6 rounded shadow transition w-full sm:w-40 cursor-pointer">
                                    Send
                                </button>
                            </div>

                            <p class="text-slate-800 text-center text-base sm:text-sm max-w-md mt-4 px-2 sm:px-0">
                                &#128712; Everything you send is indexed and encrypted. Once the recipient downloads the file, it is gone forever.
                                <a class="text-slate-600 underline ml-1" href="https://www.heifer.org/give/gift-catalog/animals/flock-of-ducks">Also, Donate to ducks!</a>
                            </p>
                        </div>
                    </div>
                `,
                receive: `
                    <div class="panel w-full flex flex-col items-center justify-center gap-6">
                        <div class="text-center">
                            <h2 class="text-3xl sm:text-4xl font-bold text-slate-800">Receive a File</h2>
                            <p class="text-slate-700 text-base sm:text-sm mt-2 px-2 sm:px-0">Enter the key code to download the shared file.</p>
                        </div>
                        <div class="w-full max-w-xs flex flex-col gap-4">
                            <form id="serialForm" class="flex flex-col gap-4">
                                <input type="text" id="serialInput" placeholder="e.g., A1B-2C3" required maxlength="7" pattern="[A-Za-z0-9]{3}-[A-Za-z0-9]{3}" title="Use the format ABC-123: 3 letters or numbers, a dash, then 3 more." autocapitalize="characters" autocomplete="off" spellcheck="false" class="w-full px-4 py-3 rounded bg-white text-slate-800 border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-600 text-center font-semibold tracking-wider">
                                <div class="flex flex-col sm:flex-row gap-3 sm:gap-4">
                                    <button type="button" data-action="back" class="w-full sm:w-1/2 bg-slate-600 hover:bg-slate-700 text-white font-medium py-3 sm:py-2 px-4 rounded transition cursor-pointer">
                                        Back
                                    </button>
                                    <button type="submit" class="w-full sm:w-1/2 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 sm:py-2 px-4 rounded shadow transition cursor-pointer">
                                        Download
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                `,
                send: `
                    <div class="panel w-full flex flex-col items-center justify-center gap-6">
                        <div class="text-center">
                            <h2 class="text-3xl sm:text-4xl font-bold text-slate-800">Send a File</h2>
                            <p class="text-slate-700 text-base sm:text-sm mt-2 px-2 sm:px-0">Upload your file. Remember, <a class="underline">the limit is 50 MB.</a></p>
                        </div>
                        <div class="w-full max-w-md flex flex-col gap-4 items-center">
                            <label class="w-full border-2 border-dashed border-slate-600 rounded-md p-6 sm:p-8 text-center cursor-pointer hover:bg-yellow-100/50 transition flex flex-col items-center gap-2">
                                <span class="text-slate-800 font-medium">Click to upload or drag file here</span>
                                <span class="text-xs text-slate-600">PDF, ZIP, PNG, etc.</span>
                                <input type="file" class="hidden">
                            </label>
                            <button type="button" data-action="back" class="bg-slate-800 hover:bg-slate-900 text-white font-medium py-3 sm:py-2 px-6 rounded transition w-full sm:w-40 cursor-pointer">
                                Back
                            </button>
                        </div>
                    </div>
                `
            };

            const FADE_OUT_MS = 180;
            const FADE_IN_MS = 280;
            const EASE_OUT = "cubic-bezier(0.4, 0, 1, 1)";
            const EASE_IN = "cubic-bezier(0, 0, 0.2, 1)";
            const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

            let isAnimating = false;

            function navigateTo(viewName) {
                if (isAnimating) return;
                const html = templates[viewName];
                const oldPanel = centralCard.querySelector(".panel");

                if (prefersReducedMotion || !oldPanel) {
                    centralCard.innerHTML = html;
                    bindPanelEvents();
                    return;
                }

                isAnimating = true;

                const startHeight = centralCard.getBoundingClientRect().height;
                centralCard.style.height = startHeight + "px";
                void centralCard.offsetHeight;

                oldPanel.style.transition = `opacity ${FADE_OUT_MS}ms ${EASE_OUT}, transform ${FADE_OUT_MS}ms ${EASE_OUT}`;
                oldPanel.style.opacity = "0";
                oldPanel.style.transform = "translateY(-6px) scale(0.98)";

                setTimeout(() => {
                    centralCard.innerHTML = html;
                    const newPanel = centralCard.querySelector(".panel");
                    newPanel.style.transition = "none";
                    newPanel.style.opacity = "0";
                    newPanel.style.transform = "translateY(6px) scale(0.98)";

                    centralCard.style.transition = "none";
                    centralCard.style.height = "auto";
                    const targetHeight = centralCard.getBoundingClientRect().height;
                    centralCard.style.height = startHeight + "px";
                    void centralCard.offsetHeight;

                    requestAnimationFrame(() => {
                        centralCard.style.transition = `height ${FADE_IN_MS}ms ${EASE_IN}`;
                        centralCard.style.height = targetHeight + "px";

                        newPanel.style.transition = `opacity ${FADE_IN_MS}ms ${EASE_IN}, transform ${FADE_IN_MS}ms ${EASE_IN}`;
                        newPanel.style.opacity = "1";
                        newPanel.style.transform = "translateY(0) scale(1)";
                    });

                    setTimeout(() => {
                        centralCard.style.transition = "none";
                        centralCard.style.height = "auto";
                        isAnimating = false;
                        bindPanelEvents();
                    }, FADE_IN_MS + 20);
                }, FADE_OUT_MS);
            }

            function formatSerialInput(e) {
                let value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
                if (value.length > 6) value = value.slice(0, 6);
                if (value.length > 3) value = value.slice(0, 3) + "-" + value.slice(3);
                e.target.value = value;
            }

            function bindPanelEvents() {
                const receiveBtn = document.getElementById("receiveBtn");
                const sendBtn = document.getElementById("sendBtn");
                const backBtn = centralCard.querySelector('[data-action="back"]');
                const serialForm = document.getElementById("serialForm");
                const serialInput = document.getElementById("serialInput");

                if (receiveBtn) receiveBtn.addEventListener("click", () => navigateTo("receive"));
                if (sendBtn) sendBtn.addEventListener("click", () => navigateTo("send"));
                if (backBtn) backBtn.addEventListener("click", () => navigateTo("menu"));
                if (serialInput) serialInput.addEventListener("input", formatSerialInput);
                if (serialForm) {
                    serialForm.addEventListener("submit", (e) => {
                        e.preventDefault();
                        if (!serialForm.checkValidity()) {
                            serialForm.reportValidity();
                            return;
                        }
                    });
                }
            }

            bindPanelEvents();
        </script>
    </body>
</html>
